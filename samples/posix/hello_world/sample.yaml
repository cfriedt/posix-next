sample:
  description: POSIX hello world sample
  name: posix hello world
common:
  tags: posix
  integration_platforms:
    - native_sim
    - qemu_riscv64
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Hello from POSIX thread: 0x[0-9a-f]+"
      - "pthread_t returned 42"
tests:
  sample.posix.hello_world: {}
