name: Coverage

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  MANIFEST_PATH: modules/lib/posix
  ZEPHYR_BASE: ${{ github.workspace }}/zephyr
  ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyr-sdk
  PLATFORMS: >-
    -p mps2/an385
    -p native_sim
    -p qemu_riscv64
    -p qemu_x86
  ROOTS: >-
    -T ${{ github.workspace }}/modules/lib/posix/samples/posix
    -T ${{ github.workspace }}/modules/lib/posix/tests/benchmarks/posix
    -T ${{ github.workspace }}/modules/lib/posix/tests/posix
    -T ${{ github.workspace }}/zephyr/samples/net
    -T ${{ github.workspace }}/zephyr/samples/subsys/shell/shell_module
    -T ${{ github.workspace }}/zephyr/tests/net
    -T ${{ github.workspace }}/zephyr/tests/lib/c_lib
    -T ${{ github.workspace }}/zephyr/tests/kernel/threads/thread_apis
    -T ${{ github.workspace }}/zephyr/tests/kernel/signal

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up workspace
        id: workspace
        uses: ./.github/actions/setup-workspace
        with:
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:x86_64-zephyr-elf

      - name: Run Tests with Coverage
        shell: bash
        working-directory: ${{ env.ZEPHYR_BASE }}
        run: |
          for d in \
            "${ZEPHYR_SDK_INSTALL_DIR}/aarch64-zephyr-elf/bin" \
            "${ZEPHYR_SDK_INSTALL_DIR}/arm-zephyr-eabi/bin" \
            "${ZEPHYR_SDK_INSTALL_DIR}/riscv64-zephyr-elf/bin" \
            "${ZEPHYR_SDK_INSTALL_DIR}/x86_64-zephyr-elf/bin"
          do
            if [ -d "$d" ]; then
              echo "$d" >> "$GITHUB_PATH"
              export PATH="$d:$PATH"
            fi
          done

          ccache --zero-stats
          ./scripts/twister \
            -i --force-color -N -v \
            --filter runnable \
            --coverage \
            --coverage-tool gcovr \
            --coverage-basedir ${{ github.workspace }} \
            ${{ env.PLATFORMS }} \
            ${{ env.ROOTS }} \
            --timeout-multiplier 2 \
            -e nano
          ccache --show-stats

      - name: Check for coverage data
        id: coverage-check
        if: always()
        shell: bash
        run: |
          if [ -f "${{ env.ZEPHYR_BASE }}/twister-out/coverage.json" ]; then
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate coverage report
        if: steps.coverage-check.outputs.has_coverage == 'true'
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/coverage-report
          gcovr \
            -r ${{ github.workspace }} \
            --add-tracefile ${{ env.ZEPHYR_BASE }}/twister-out/coverage.json \
            --html-details ${{ github.workspace }}/coverage-report/index.html \
            --filter 'modules/lib/posix/include' \
            --filter 'modules/lib/posix/lib' \
            --filter 'zephyr/kernel' \
            --filter 'zephyr/lib/elastipool' \
            --filter 'zephyr/lib/libc/common/source/thrd' \
            --filter 'zephyr/lib/os/zvfs' \
            --filter 'zephyr/lib/os/thread.c'

      - name: Upload coverage report
        if: steps.coverage-check.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/

      - name: Save workspace ccache
        if: always() && !cancelled()
        uses: ./.github/actions/save-workspace-ccache
        with:
          cache-primary-key: ${{ steps.workspace.outputs.ccache-primary-key }}
