common:
  tags:
    - posix
    - threads
    - cancel
    - cpp
    - exceptions
  timeout: 10
  # 1 tier0 platform per supported architecture
  platform_key:
    - arch
    - simulation
  integration_platforms:
    - qemu_x86_64
  min_ram: 32
tests:
  posix.threads.cancel.cpp: {}
  posix.threads.cancel.cpp.userspace:
    filter: CONFIG_ARCH_SUPPORTS_USERSPACE_SIGNALS
    tags:
      - userspace
    extra_configs:
      - CONFIG_USERSPACE=y
