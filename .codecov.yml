codecov:
  notify:
    require_ci_to_pass: yes

# gcovr emits west-workspace paths; posix-next git tree is repo-root relative.
fixes:
  - "modules/lib/posix/::"

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default: false
      nightly:
        flags:
          - nightly
        target: auto
    patch:
      default:
        target: auto
        threshold: 0%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: nightly
      carryforward: true
      paths:
        - include/
        - lib/posix/
    - name: pr-diff
      carryforward: false
      paths:
        - include/
        - lib/posix/

comment:
  layout: "reach, diff, flags, components, files, footer"
  behavior: default
  require_changes: no

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

# Option Group components align with coverageui EMBED_POSIX_MANIFEST IDs.
# Kconfig directory names are implementation layout; paths may overlap (shared code).
component_management:
  individual_components:
    - component_id: posix_shared
      name: Shared options infrastructure
      paths:
        - lib/posix/options/shared/**
    - component_id: posix_headers
      name: Public POSIX headers (flat include tree)
      paths:
        - include/zephyr/posix/**
