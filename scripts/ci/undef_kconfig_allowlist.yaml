# POSIX module Kconfig compliance allowlist.
#
# outside: CONFIG_* references outside Kconfig files (no CONFIG_ prefix here).
# within:  undefined symbols reported while parsing the Kconfig tree.
#
# For personal additions, copy undef_kconfig_allowlist.local.yaml.example to
# undef_kconfig_allowlist.local.yaml (gitignored).

outside:
  - DYNAMIC_THREAD_POOL_SIZ
  - GETOPT_LONG
  - GETOPT_SHELL
  - POSIX_PTHREAD_ATTR_GUARDSIZE_BITS
  - POSIX_PTHREAD_ATTR_GUARDSIZE_DEFAULT
  - POSIX_PTHREAD_ATTR_STACKSIZE_BITS
  - POSIX_SIGNAL_STRING_DESC
  - POSIX_THREAD_SAFE_FUNCTIONS
  - SIGNAL_QUEUE_SIZE_ADD_
  - SIGNAL_SET_SIZE_MIN_
  - SYS_THREAD_
  - SYS_THREAD_MUTEX_MIN_ADD_MYLIB
  - SYS_THREAD_STACK_ALLOC
  - TC_PROVIDES_
  - ZVFS_OPEN_ADD_SIZE_POSIX

within:
  - SYS_HASH_MAP_CXX
