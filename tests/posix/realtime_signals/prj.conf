CONFIG_POLL=y
CONFIG_RING_BUFFER=y
CONFIG_SIGNAL=y
CONFIG_ZTEST=y

# allow up to 8 realtime signals
CONFIG_SIGNAL_SET_SIZE=42

# ensure the queue can hold our set of realtime signals
CONFIG_SIGNAL_QUEUE_SIZE=8

# ensure that at least one custom signal action can be installed
CONFIG_SIGNAL_ACTION_DB_SIZE=1

CONFIG_POSIX_AEP_CHOICE_PSE51=y
CONFIG_POSIX_SIGNALS=y
CONFIG_POSIX_REALTIME_SIGNALS=y
