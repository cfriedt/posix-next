common:
  min_ram: 48
  tags:
    - iface
    - net
    - posix_networking
  platform_key:
    - arch
    - simulation
tests:
  portability.posix.networking:
    filter: not CONFIG_NATIVE_LIBC
    extra_configs:
      - CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16384
  portability.posix.networking.armclang_std_libc:
    filter: not CONFIG_NATIVE_LIBC
    toolchain_allow: armclang
    extra_configs:
      - CONFIG_ARMCLANG_STD_LIBC=y
  portability.posix.networking.arcmwdtlib:
    filter: not CONFIG_NATIVE_LIBC
    toolchain_allow: arcmwdt
    extra_configs:
      - CONFIG_ARCMWDT_LIBC=y
  portability.posix.networking.minimal:
    filter: not CONFIG_NATIVE_LIBC
    extra_configs:
      - CONFIG_MINIMAL_LIBC=y
      - CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16384
  portability.posix.networking.newlib:
    filter: (not CONFIG_NATIVE_LIBC) and (TOOLCHAIN_HAS_NEWLIB == 1)
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
  portability.posix.networking.picolibc:
    tags: picolibc
    filter: (not CONFIG_NATIVE_LIBC) and CONFIG_PICOLIBC_SUPPORTED
    extra_configs:
      - CONFIG_PICOLIBC=y
  portability.posix.networking.linux_compat:
    tags: native
    platform_allow:
      - native_sim
      - native_sim/native/64
    filter: CONFIG_NATIVE_LIBC
    extra_configs:
      - CONFIG_POSIX_TEST_LINUX_COMPAT=y
      - CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16384
