CONFIG_ZTEST=y

CONFIG_SYS_THREAD_STACK_MIN_ADD_TEST=1
CONFIG_SYS_THREAD_THREAD_MIN_ADD_TEST=1

CONFIG_POSIX_AEP_CHOICE_BASE=y
CONFIG_XSI=y
CONFIG_XSI_THREADS_EXT=y

# This is mainly necessary in order to track a pointer for anonymously allocated stacks when the
# platform supports an MMU and the requested stack size is greater than CONFIG_SYS_THREAD_STACK_SIZE
# (e.g. a large stack size).
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=512
