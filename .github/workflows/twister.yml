name: Run tests with twister

on:
  push:
    branches:
      - main
      - v*-branch
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - v*-branch
      # Disabled for now until a self-hosted runner is available
      # schedule:
      #   # Run at 02:00 UTC on every Sunday
      #   - cron: '0 2 * * 0'

concurrency:
  # One active run per PR (or per ref on push); avoids overlapping jobs on the same cache key.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MANIFEST_PATH: modules/lib/posix
  ZEPHYR_BASE: ${{ github.workspace }}/zephyr
  PLATFORMS: >-
    -p mps2/an385
    -p native_sim
    -p qemu_cortex_a53
    -p qemu_riscv64
    -p qemu_x86
    -p qemu_x86_64
  ROOTS: >-
    -T ${{ github.workspace }}/modules/lib/posix/samples/posix
    -T ${{ github.workspace }}/modules/lib/posix/tests/benchmarks/posix
    -T ${{ github.workspace }}/modules/lib/posix/tests/posix
    -T ${{ github.workspace }}/zephyr/samples/net
    -T ${{ github.workspace }}/zephyr/samples/subsys/shell/shell_module
    -T ${{ github.workspace }}/zephyr/tests/net
    -T ${{ github.workspace }}/zephyr/tests/lib/c_lib
    -T ${{ github.workspace }}/zephyr/kernel/threads/thread_apis
    -T ${{ github.workspace }}/zephyr/kernel/signal

jobs:
  twister-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up workspace
        id: workspace
        uses: ./.github/actions/setup-workspace
        with:
          toolchains: aarch64-zephyr-elf:arm-zephyr-eabi:riscv64-zephyr-elf:x86_64-zephyr-elf

      - name: Run Tests with Twister (Pull Request)
        if: github.event_name == 'pull_request'
        shell: bash
        working-directory: ${{ env.ZEPHYR_BASE }}
        env:
          MANIFEST: ${{ github.workspace }}/${{ env.MANIFEST_PATH }}
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          ccache --zero-stats

          # Use -m (not -c): test_plan's west.yml compare writes west_old.yml under
          # ZEPHYR_BASE and breaks when manifest.self.path is nested.
          git -C "${MANIFEST}" diff --name-only "${BASE_REF}.." \
            | python3 -c 'import json,sys; json.dump([l for l in sys.stdin.read().splitlines() if l], sys.stdout)' \
            > changed_files.json

          ./scripts/ci/test_plan.py -r "${MANIFEST}" \
            -m changed_files.json \
            --pull-request \
            ${{ env.PLATFORMS }} \
            ${{ env.ROOTS }}

          # run twister with the generated testplan
          # there are about 625 tests that get pulled into this run with the specified platforms
          # and roots. for now, hard-coded limit of first 25th of shuffled tests to reduce
          # on-diff CI time
          ./scripts/twister -i -c \
            --subset 1/25  --shuffle-tests \
            --load-tests testplan.json \
            ${{ env.PLATFORMS }} \
            ${{ env.ROOTS }}

          ccache --show-stats

      - name: Run Tests with Twister (Nightly)
        if: github.event_name == 'schedule'
        shell: bash
        working-directory: ${{ env.ZEPHYR_BASE }}
        run: |
          ccache --zero-stats
          west twister -c -i ${{ env.PLATFORMS }} ${{ env.ROOTS }}
          ccache --show-stats

      - name: Save workspace ccache
        if: always() && !cancelled()
        uses: ./.github/actions/save-workspace-ccache
        with:
          cache-primary-key: ${{ steps.workspace.outputs.ccache-primary-key }}
          save: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
