manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  # zephyr-keep-sorted-start re(^\s+\- name:)
  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.4.1
      import:
        name-allowlist:
          - cmsis_6
          - fatfs
          - hostap
          - littlefs
          - mbedtls
          - picolibc
          - tf-psa-crypto
          - zcbor
  # zephyr-keep-sorted-stop

  self:
    path: modules/lib/posix
