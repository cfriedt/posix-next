sample:
  description: posix env sample
  name: posix env
common:
  tags:
    - posix
    - env
  # stdout interferes with coverage reporting
  filter: not CONFIG_COVERAGE
  integration_platforms:
    - native_sim
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "BOARD=.*"
      - "BUILD_VERSION=.*"
      - "ALERT="
tests:
  sample.posix.env: {}
