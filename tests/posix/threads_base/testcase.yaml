common:
  filter: not CONFIG_NATIVE_LIBC
  tags:
    - posix_threads_base
  min_ram: 64
  timeout: 240
  # 1 tier0 platform per supported architecture
  platform_key:
    - arch
    - simulation
tests:
  portability.posix.threads_base: {}
  portability.posix.threads_base.minimal:
    extra_configs:
      - CONFIG_MINIMAL_LIBC=y
  portability.posix.threads_base.newlib:
    platform_exclude:
      - intel_ehl_crb
      - lpcxpresso55s06
    filter: TOOLCHAIN_HAS_NEWLIB == 1
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
  portability.posix.threads_base.armclang_std_libc:
    toolchain_allow: armclang
    extra_configs:
      - CONFIG_ARMCLANG_STD_LIBC=y
  portability.posix.threads_base.arcmwdtlib:
    toolchain_allow: arcmwdt
    extra_configs:
      - CONFIG_ARCMWDT_LIBC=y
  portability.posix.threads_base.tls:
    platform_exclude:
      - intel_ehl_crb
    filter: CONFIG_ARCH_HAS_THREAD_LOCAL_STORAGE and CONFIG_TOOLCHAIN_SUPPORTS_THREAD_LOCAL_STORAGE
    extra_configs:
      - CONFIG_NEWLIB_LIBC=n
      - CONFIG_THREAD_LOCAL_STORAGE=y
  portability.posix.threads_base.tls.newlib:
    platform_exclude:
      - intel_ehl_crb
      - lpcxpresso55s06
    filter: TOOLCHAIN_HAS_NEWLIB == 1 and CONFIG_ARCH_HAS_THREAD_LOCAL_STORAGE and
      CONFIG_TOOLCHAIN_SUPPORTS_THREAD_LOCAL_STORAGE
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
      - CONFIG_THREAD_LOCAL_STORAGE=y
  portability.posix.threads_base.picolibc:
    tags: picolibc
    filter: CONFIG_PICOLIBC_SUPPORTED
    extra_configs:
      - CONFIG_PICOLIBC=y
  portability.posix.threads_base.no_spin_validate:
    extra_configs:
      - CONFIG_SPIN_VALIDATE=n
  portability.posix.threads_base.dynamic_stack:
    extra_configs:
      - CONFIG_SYS_THREAD_STACK_MIN_ADD_TEST=0
      - CONFIG_SYS_THREAD_THREAD_MIN_ADD_TEST=0
      - CONFIG_HEAP_MEM_POOL_SIZE=16384
  portability.posix.threads_base.static_stack:
    extra_configs:
      - CONFIG_SYS_THREAD_STACK_MIN_ADD_TEST=0
      - CONFIG_SYS_THREAD_THREAD_MIN_ADD_TEST=0
      - CONFIG_SYS_THREAD_STACK_MAX=0
      - CONFIG_THREAD_STACK_INFO=n
