# C++ exception handling test requirements
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_CPP_EXCEPTIONS=y
CONFIG_ZTEST=y

# POSIX thread requirements
CONFIG_POSIX_AEP_CHOICE_PSE51=y

# System thread pool configuration
CONFIG_SYS_THREAD_THREAD_MIN=1
CONFIG_SYS_THREAD_STACK_MIN=1
CONFIG_SIGNAL_QUEUE_SIZE=2

CONFIG_KOBJECT_TEXT_AREA=512

# Stack size for test threads
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_TEST_EXTRA_STACK_SIZE=1024
