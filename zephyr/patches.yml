  - path: zephyr/misc-fixes-for-coverage.patch
    sha256sum: ca4dc5082483b7bc0dd8d51289fe1556573274a92fb7a4ebccf85a59d6a309bb
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-05-30
    upstreamable: true
    comments: |
      Apply a number of fixes so that a twister coverage run passes (almost) everywhere. Some
      tests skipped due to timing issues introduced by coverage instrumentation. Other tests
      skipped due to stack size issues. Fixed linker script / pmp on riscv to allow coverage
      to link and not fault. Improved robustness of coverage.py itself by catching hex_dump
      parsing exceptions. Increased strfmon buffer size to accomodate coverage tests using
      native libc (not necessary for coverage as native libc does not emit coverage data, but
      avoids faults when coverage is enabled).
  - path: zephyr/minor-improvements-for-coverage-py.patch
    sha256sum: c2e2088d4a5611414329f34d8100c07675d3c7f063c6f8c3e699dc85969167ad
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-07
    upstreamable: true
    comments: |
      Minor improvements for coverage.py.
  - path: zephyr/posix-c-lang-support-r.patch
    sha256sum: 5a2ba4b43b0292bec76932d8ae564255a0643594fdbd1a995d8095539d6fc701
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-07
    upstreamable: true
    comments: |
      Re-home POSIX_C_LANG_SUPPORT_R implementation and some tests as we would like to count test
      coverage (and really, ISO C does not provide most of the reentrant functions). ISO C only
      provides gmtime_r() and localtime_r() as of C23. Adjust dependencies so that the common libc
      (non-reentrant) versions select CONFIG_POSIX_C_LANG_SUPPORT_R as needed. Toolchains may
      override the implementation of POSIX_C_LANG_SUPPORT_R by selecting
      TC_PROVIDES_POSIX_C_LANG_SUPPORT_R. Improved test coverage for POSIX_C_LANG_SUPPORT_R
      significantly and also added a test configuration which ensures compatibility with Linux
      / glibc.
  - path: zephyr/minimal-libc-hoist-c-lib-ext-to-posix.patch
    sha256sum: e87f9fb2b50eba7de4b52979606cebc8bd16ef064a668b602458624c32a095b1
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-18
    upstreamable: true
    comments: |
      Deprecate CONFIG_COMMON_LIBC_STRNLEN in favor of POSIX_C_LIB_EXT and stop building the
      common-libc strnlen() when the POSIX extension implementation should be used instead.
      Move POSIX_C_LIB_EXT string extensions out of minimal-libc: drop strnlen and strncasecmp
      declarations from string.h and strings.h, remove strncasecmp.c, and provide them via
      posix-next instead. C_LANG_SUPPORT_R symbols (strerror_r, strtok_r) remain handled by
      posix-c-lang-support-r.patch.
  - path: zephyr/zvfs-libc-file-fd-fix.patch
    sha256sum: 1f4b778ef2a0e5e02e3302c89dd96c532822d0ffc90df358f9c083da44911d3a
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-19
    upstreamable: true
    comments: |
      Bind C library FILE objects to ZVFS file descriptors via per-libc
      zvfs_libc_fdopen()/zvfs_libc_fileno() hooks and a generic, statically-
      allocated FILE-object store (k_mem_slab), fixing the #108818 fd_entry-to-
      FILE cast crash. Add common libc fopen()/freopen()/fclose() on zvfs_open()
      without POSIX_FILE_SYSTEM by moving zvfs_open() and the FS fd vtable into
      lib/os/zvfs/zvfs_fs.c (CONFIG_ZVFS_FS). Reserve fd table slots via
      CONFIG_ZVFS_RESERVE_STDIO_FDS and CONFIG_ZVFS_OPEN_ADD_SIZE_STDIO.
  - path: zephyr/zvfs-introduce-k-obj-file.patch
    sha256sum: 0976f5e1d982ea888ce5cfb224b15968d9e13f05f16c7c333db1f7e1fd5d5dee
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-19
    upstreamable: true
    comments: |
      Register each static fdtable slot as a K_OBJ_FILE kernel object for
      userspace permission checks. Initialize slots at boot, recycle permissions
      on reserve, and clear initialization when the last reference is dropped.
      Forbid dynamic allocation of K_OBJ_FILE. Extend
      kernel.memory_protection.obj_validation with fdtable slot checks (no POSIX).
  - path: zephyr/zvfs-fdtable-use-k-obj-file.patch
    sha256sum: eb643c3c4c88766ab7ad62c8d3afda0d271de476fd521b6c96538efd1b4480c4
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-19
    upstreamable: true
    comments: |
      Relocate fdtable core to lib/os/zvfs/, split I/O accessors into sibling
      files with K_OBJ_FILE syscall verifiers, and add documented zvfs.h.
      Replace scattered zvfs_* prototypes with zvfs.h includes.
  - path: zephyr/minimal-libc-fgetc-fgets.patch
    sha256sum: 5c013dbca5acee0fb134bf3d00fffdbbae19242b3cb62cbe1811ab8437c81508
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-19
    upstreamable: true
    comments: |
      Implement fgetc() and fgets() in minimal libc, since it was needed to
      satisfy e.g. POSIX_SYSTEM_DATABASE_R tests.
  - path: zephyr/zvfs-file-locking.patch
    sha256sum: e6c84d53a64b0243e57098d6ca6d021ea1b7002a1f18c25004a4eb6906ed73a4
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-20
    upstreamable: true
    comments: |
      Add ZVFS file-locking helpers (zvfs_lock_file, zvfs_getc_unlocked, etc.)
      and refactor zvfs_rw() so unlocked I/O can run under flockfile().
      Route minimal-libc stdout through z_impl_zephyr_write_stdout for reserved
      stdio fds. Select TC_PROVIDES_POSIX_FILE_LOCKING for picolibc.
  - path: zephyr/libc-sys-select-h.patch
    sha256sum: 768c81da47da41a5cd6ab40a2004a953c6f459915d4e3d83e5fa5f56fa462de2
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-30
    upstreamable: true
    comments: |
      Replace picolibc and newlib <sys/select.h> with Zephyr-local headers that
      mirror zvfs_fd_set and declare FD_CLR(), FD_ISSET(), FD_SET(), and FD_ZERO()
      as functions instead of libc macros over an incompatible bit-array fd_set.
  - path: zephyr/minimal-libc-fread.patch
    sha256sum: 09f5cdd98beffb6307fbeb075ff71a0583ecba577cc95f0193911c11ef989545
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-30
    upstreamable: true
    comments: |
      Implement fread() for minimal libc on ZVFS-backed FILE streams, mirroring the
      existing fwrite() path. Adds zephyr_fread() syscall hook for userspace builds.
  - path: zephyr/minimal-libc-fseek.patch
    sha256sum: 035c7cf0060296b77bb1a157feb4744ebbe6205b827e6fb23da565648dfb833f
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-04
    upstreamable: true
    comments: |
      Implement C89 stdio positioning for minimal libc on ZVFS-backed FILE streams:
      clearerr(), fgetpos(), fseek(), fsetpos(), ftell(), and rewind(). Required for
      POSIX_FD_MGMT when CONFIG_MINIMAL_LIBC is selected (fseeko()/ftello() live in
      posix-next fd_mgmt and delegate to fileno()/lseek()).
  - path: zephyr/zvfs-pread-pwrite-regular-files.patch
    sha256sum: 55f523dcc66c2bee970e2a6ad7cfc369f5599825bf643da07641793ef2ba4cdb
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-01
    upstreamable: true
    comments: |
      Allow pread() and pwrite() on ZVFS-backed regular files via the existing
      fs read_offs and write_offs vtable methods, restoring the underlying file
      position after offset I/O so lseek(SEEK_CUR) is unchanged.
  - path: zephyr/zvfs-dup.patch
    sha256sum: e4d5402521595461b276186b20012a72214e6af103333af3ab7caa2e1eaebe60
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-30
    upstreamable: true
    comments: |
      Add zvfs_dup() and zvfs_dup2() with F_DUPFD fcntl support and refcount-aware
      close when multiple file descriptors share the same underlying object.
  - path: zephyr/zvfs-fcntl-getfd-setfd.patch
    sha256sum: 2a1e41d85f026ea586a3b2d6bab1ae0bc7a5efc4d04f83b6cb17674ae3a3bb33
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-30
    upstreamable: true
    comments: |
      Add per-fd descriptor flags to the ZVFS fd table and implement fcntl()
      F_GETFD, F_SETFD, and F_DUPFD_CLOEXEC.
  - path: zephyr/zvfs-fcntl-record-lock.patch
    sha256sum: 1ed53555f8570e6460468fdaf7e8b510ba1e08c0cf73d60e0b19c3597bd80e75
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-06-30
    upstreamable: true
    comments: |
      Implement POSIX advisory record locking via fcntl() F_GETLK, F_SETLK, and
      F_SETLKW for ZVFS-backed regular files, with libc fcntl command normalization.
  - path: zephyr/net-sockets-weak-inet-pton.patch
    sha256sum: 83b03d901a03d8249d49c3a3b87621f7612acdfff10cde2e83ba21ac621a7a34
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-18
    upstreamable: true
    comments: |
      Provide a weak inet_pton() forwarding to zsock_inet_pton() when
      CONFIG_POSIX_NETWORKING is disabled, so socket/TLS tests that reference
      inet_pton() link without pulling in the POSIX networking option group.
  - path: zephyr/arm-cortex-m-decouple-exception-from-switch.patch
    sha256sum: a3b6acb7c50a3b61c644a79d3d309631c95679e1ec84b89be9f3cb1919e2615c
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-18
    upstreamable: true
    comments: |
      Decouple <zephyr/arch/exception.h> from the Cortex-M context-switch
      machinery: factor the _EXC_* priority macros into cortex_m/cpu.h and stop
      cortex_m/exception.h from including arm-m-switch.h (and thus kernel/thread.h),
      restoring the cross-arch convention that v4.4.1's new arm-m-switch.h broke.
      Fixes '_EXC_IRQ_DEFAULT_PRIO undeclared' and the CONFIG_SIGNAL circular
      include on Cortex-M.
  - path: zephyr/picolibc-pthread-use-zephyr-posix.patch
    sha256sum: 2d89e6805136aa37bb03e9181c5107b1d40d05905f674e8ce52760aafc8b306a
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-18
    upstreamable: true
    comments: |
      Make Zephyr's picolibc pthread.h shim include <zephyr/posix/...>
      unconditionally; SDK 1.0.x no longer ships the toolchain picolibc pthread.h
      that the previous conditional include depended on.
  - path: zephyr/net-mgmt-test-wait-for-async-delivery.patch
    sha256sum: 22f551c83748823ad0e4cb4f280eac27f9b177758e76567eba2f1b14067cc459
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-18
    upstreamable: true
    comments: |
      Make tests/net/mgmt deterministic: poll rx_calls for async net_mgmt event
      delivery instead of a single fixed k_msleep(THREAD_SLEEP), which races on
      platforms where the worker drains its queue slower than the sleep (e.g.
      mps2/an385 under QEMU deterministic icount). Upstream v4.4.1 test fragility,
      not specific to the POSIX module.
  - path: picolibc/tinystdio-fgetpos-fsetpos.patch
    sha256sum: 5fcf090847b930dff1a2da52e6e24711a64c37d428be9e0db7ba8cd92348dcaa
    module: picolibc
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-08
    upstreamable: true
    comments: |
      Add fgetpos.c, fsetpos.c, and flockfile_init.c to the picolibc tinystdio CMake
      build (already listed in meson.build). Without these, native_sim resolves
      fgetpos()/fsetpos() from host glibc against picolibc FILE objects and hangs.
      Also expose the tinystdio source directory for stdio_private.h includes.
  - path: zephyr/tracing-ctf-forward-declare-zvfs-pollfd.patch
    sha256sum: 63aef3b050e3c90ce8bad58b5de37faa3f23b2cc430127b08c7000973d18fe57
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-07-15
    upstreamable: true
    comments: |
      Forward-declare struct zvfs_pollfd in tracing_ctf.h to break fdtable→kernel→tracing include cycle.
