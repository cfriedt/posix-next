common:
  filter: not CONFIG_NATIVE_LIBC
  tags:
    - posix_spin_locks
  # 1 tier0 platform per supported architecture
  platform_key:
    - arch
    - simulation
  integration_platforms:
    - qemu_x86_64
  min_flash: 64
  min_ram: 32
tests:
  portability.posix.spin_locks: {}
  portability.posix.spin_locks.minimal:
    extra_configs:
      - CONFIG_MINIMAL_LIBC=y
  portability.posix.spin_locks.newlib:
    filter: TOOLCHAIN_HAS_NEWLIB == 1
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
  portability.posix.spin_locks.picolibc:
    tags: picolibc
    filter: CONFIG_PICOLIBC_SUPPORTED
    extra_configs:
      - CONFIG_PICOLIBC=y
  portability.posix.spin_locks.no_spin_validate:
    extra_configs:
      - CONFIG_SPIN_VALIDATE=n
