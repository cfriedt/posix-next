common:
  filter: not CONFIG_NATIVE_LIBC
  tags:
    - posix_signals
  # 1 tier0 platform per supported architecture
  platform_key:
    - arch
    - simulation
  min_flash: 64
  min_ram: 32
  # Exclude qemu_arc/qemu_arc_hs5x for now because of qemu_arc issue
  # qemu-system-arc: /usr/src/debug/nativesdk-qemu-arc/git/target/arc/decoder-v2.c:266:
  #   arc_find_format_v2: Assertion `mcount != 0' failed.
  # Aborted (core dumped)
  platform_exclude:
    - qemu_arc/qemu_arc_hs5x
tests:
  portability.posix.signals:
    integration_platforms:
      - qemu_riscv64
  portability.posix.signals.minimal:
    integration_platforms:
      - qemu_riscv64
    extra_configs:
      - CONFIG_MINIMAL_LIBC=y
  portability.posix.signals.newlib:
    integration_platforms:
      - qemu_riscv64
    filter: TOOLCHAIN_HAS_NEWLIB == 1
    extra_configs:
      - CONFIG_NEWLIB_LIBC=y
  portability.posix.signals.picolibc:
    integration_platforms:
      - qemu_riscv64
    tags: picolibc
    filter: CONFIG_PICOLIBC_SUPPORTED
    extra_configs:
      - CONFIG_PICOLIBC=y
  portability.posix.signals.big_nsig:
    # Large SIGNAL_SET_SIZE grows k_sig_ctx and pushes callee_saved past the
    # ARM64 stp/ldp immediate offset limit in arch/arm64/core/switch.S.
    platform_allow:
      - qemu_riscv64
    integration_platforms:
      - qemu_riscv64
    extra_configs:
      - CONFIG_POSIX_RTSIG_MAX=1024
      - CONFIG_SIGNAL_SET_SIZE=1058
  portability.posix.signals.linux_compat:
    tags: native
    filter: CONFIG_NATIVE_LIBC
    extra_configs:
      - CONFIG_POSIX_TEST_LINUX_COMPAT=y
