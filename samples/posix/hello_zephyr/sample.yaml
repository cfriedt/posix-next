sample:
  description: POSIX hello world using native Zephyr threads
  name: posix hello zephyr
common:
  tags:
    - posix_threads_base
  integration_platforms:
    - native_sim
    - qemu_riscv64
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Hello World! .* from k_thread 0x[0-9a-f]+"
      - "k_thread returned 42"
tests:
  sample.posix.hello_zephyr: {}
