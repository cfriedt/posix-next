  - path: zephyr/k-condvar-clockwait.patch
    sha256sum: ff6a2d22b1d836bd531345eff62a77d7498470d6b4f9f70f0d32688e50bd7bc8
    module: zephyr
    author: Chris Friedt
    email: chris@fr4.co
    date: 2026-05-22
    upstreamable: true
    comments: |
      Support timespec-based absolute timeouts for condition variables. These functions are used
      to support standard threading APIs such as C11, C++11, and POSIX. Moving the
      absolute-to-relative conversion into the kernel ensures that there are fewer race conditions
      and sources of error which are common when multiple timepoint conversion happens in several
      places.
