# Twister tag → changed-file mapping for the posix manifest repo (-r modules/lib/posix).
# Used by test_plan.py (--alt-tags) for PR tag-based filtering.
#
# File format matches zephyr/scripts/ci/tags.yaml (paths relative to manifest root).

posix:
  files:
    - lib/posix/
    - include/zephyr/posix/
    - include/zephyr/getopt.h
    - tests/posix/
    - tests/benchmarks/posix/
    - samples/posix/
    - zephyr/patches/
    - zephyr/patches.yml

# Run Zephyr integration tests in twister_pr roots when posix lib/patches change.
kernel:
  files:
    - lib/posix/
    - include/zephyr/posix/
    - zephyr/patches/
    - zephyr/patches.yml

net:
  files:
    - lib/posix/
    - include/zephyr/posix/
    - tests/posix/net/
    - zephyr/patches/
    - zephyr/patches.yml
