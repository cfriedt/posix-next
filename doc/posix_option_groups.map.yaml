# SPDX-License-Identifier: Apache-2.0
#
# Maps each public POSIX header to the primary (and optional secondary)
# POSIX Option Group / Option Sphinx anchors defined in:
#   doc/posix/option_groups/index.rst
#
# Used by:
#   - Doxygen @ingroup / @defgroup in each header (primary group)
#   - Phase 3 posix_symbols Sphinx extension (secondary linkage)
#
# Anchor format:
#   posix_option_group_<name>  POSIX Option Groups  (e.g. POSIX_THREADS_BASE)
#   posix_option_<name>        POSIX Options        (e.g. _POSIX_MESSAGE_PASSING)
#
# Source of truth: doc/posix/option_groups/index.rst
# Cross-check:     https://pubs.opengroup.org/onlinepubs/9699919799/xrat/V4_subprofiles.html

# ---------------------------------------------------------------------------
# Threads and synchronization
# ---------------------------------------------------------------------------

pthread.h:
  primary: posix_option_group_threads_base
  secondary:
    - posix_option_group_non_portable
    - posix_option_group_posix_threads_ext
    - posix_option_group_xsi_threads_ext
    - posix_option_group_barriers
    - posix_option_group_rw_locks
    - posix_option_group_spin_locks

sys/types.h:
  primary: posix_option_group_threads_base

# sched_yield is POSIX_THREADS_BASE; sched_get_priority_* and process sched_* are XSI_REALTIME
sched.h:
  primary: posix_option_group_xsi_realtime
  secondary:
    - posix_option_priority_scheduling
    - posix_option_group_threads_base

semaphore.h:
  primary: posix_option_group_semaphores

# ---------------------------------------------------------------------------
# Signals
# ---------------------------------------------------------------------------

posix_signal.h:
  primary: posix_option_group_signals
  secondary:
    - posix_option_group_realtime_signals

# strsignal() is listed under POSIX_SIGNALS in the Zephyr RST
posix_string.h:
  primary: posix_option_group_signals

# ---------------------------------------------------------------------------
# Timers and clocks
# ---------------------------------------------------------------------------

posix_time.h:
  primary: posix_option_group_timers
  secondary:
    - posix_option_group_clock_selection

# gettimeofday() is XSI_SINGLE_PROCESS
sys/time.h:
  primary: posix_option_group_xsi_single_process

# mq_* are _POSIX_MESSAGE_PASSING; mq_timed* require _POSIX_TIMEOUTS (via CONFIG_POSIX_TIMERS)
mqueue.h:
  primary: posix_option_message_passing
  secondary:
    - posix_option_timeouts

# ---------------------------------------------------------------------------
# File I/O and descriptors
# ---------------------------------------------------------------------------

# fcntl() is POSIX_FD_MGMT; creat()/open() are POSIX_DEVICE_IO / POSIX_FILE_SYSTEM
fcntl.h:
  primary: posix_option_group_fd_mgmt
  secondary:
    - posix_option_group_device_io
    - posix_option_group_file_system

# poll() is POSIX_DEVICE_IO
poll.h:
  primary: posix_option_group_device_io

# select()/pselect() are POSIX_DEVICE_IO; FD_* macros are also POSIX_DEVICE_IO
sys/select.h:
  primary: posix_option_group_device_io

unistd.h:
  primary: posix_option_group_single_process

sys/stat.h:
  primary: posix_option_group_file_system

dirent.h:
  primary: posix_option_group_file_system

sys/pathconf.h:
  primary: posix_option_group_file_system

sys/mman.h:
  primary: posix_option_group_mapped_files

# ioctl() is _XOPEN_STREAMS (XSI_STREAMS Option Group)
sys/ioctl.h:
  primary: posix_option_group_xsi_streams

# ---------------------------------------------------------------------------
# Single process / system info
# ---------------------------------------------------------------------------

# uname() is POSIX_SINGLE_PROCESS
sys/utsname.h:
  primary: posix_option_group_single_process

# times() is POSIX_MULTI_PROCESS (not POSIX_SINGLE_PROCESS)
sys/times.h:
  primary: posix_option_group_multi_process

sys/sysconf.h:
  primary: posix_option_group_single_process

sys/confstr.h:
  primary: posix_option_group_single_process

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------

sys/socket.h:
  primary: posix_option_group_networking

arpa/inet.h:
  primary: posix_option_group_networking

net/if.h:
  primary: posix_option_group_networking

netdb.h:
  primary: posix_option_group_networking

netinet/in.h:
  primary: posix_option_group_networking

netinet/tcp.h:
  primary: posix_option_group_networking

# ---------------------------------------------------------------------------
# C library extensions
# ---------------------------------------------------------------------------

fnmatch.h:
  primary: posix_option_group_c_lib_ext

# strfmon() is POSIX_C_LIB_EXT; strfmon_l() is POSIX_MULTI_CONCURRENT_LOCALES
monetary.h:
  primary: posix_option_group_c_lib_ext

# setenv/unsetenv are POSIX_SINGLE_PROCESS; getsubopt is POSIX_C_LIB_EXT
posix_stdlib.h:
  primary: posix_option_group_single_process
  secondary:
    - posix_option_group_c_lib_ext

# strsignal() is listed under POSIX_SIGNALS in the Zephyr RST
posix_string.h:
  primary: posix_option_group_signals

# ---------------------------------------------------------------------------
# System logging
# ---------------------------------------------------------------------------

syslog.h:
  primary: posix_option_group_xsi_system_logging

# ---------------------------------------------------------------------------
# Thread-safe database access
# ---------------------------------------------------------------------------

# getpwnam_r/getpwuid_r are POSIX_SYSTEM_DATABASE_R
pwd.h:
  primary: posix_option_group_system_database_r

# getgrnam_r/getgrgid_r are POSIX_SYSTEM_DATABASE_R
grp.h:
  primary: posix_option_group_system_database_r

# ---------------------------------------------------------------------------
# XSI STREAMS
# ---------------------------------------------------------------------------

# ioctl/fattach/fdetach/getmsg/getpmsg/isastream/putmsg are _XOPEN_STREAMS (XSI_STREAMS)
stropts.h:
  primary: posix_option_group_xsi_streams

# ---------------------------------------------------------------------------
# Async I/O
# ---------------------------------------------------------------------------

# aio_* and lio_listio are _POSIX_ASYNCHRONOUS_IO
aio.h:
  primary: posix_option_asynchronous_io

# ---------------------------------------------------------------------------
# Linux extensions (no upstream POSIX option)
# ---------------------------------------------------------------------------

sys/eventfd.h:
  primary: null

# ---------------------------------------------------------------------------
# Limits (cross-cutting; referenced in option group pages directly)
# ---------------------------------------------------------------------------

posix_limits.h:
  primary: null
