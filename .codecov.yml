codecov:
  notify:
    require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default: false
      nightly:
        flags:
          - nightly
        target: auto
    patch:
      default:
        target: auto
        threshold: 0%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: nightly
      carryforward: true
    - name: pr-diff
      carryforward: false
      paths:
        - modules/lib/posix/include/
        - modules/lib/posix/lib/

comment:
  layout: "reach, diff, flags, files, footer"
  behavior: default
  require_changes: no

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no
