<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" width="225.805" height="225.805" viewBox="-112.9025 -112.9025 225.805 225.805" xmlns="http://www.w3.org/2000/svg">
  <!-- Zephyr kite colour scheme: outer deep purple → blue → light blue → sky blue -->
  <circle cx="0"  fill="#7929d2" r="100"/>
  <circle cx="25" fill="#0070c5" r="75"/>
  <circle cx="50" fill="#00aeff" r="50"/>
  <circle cx="75" fill="#b1e4fa" r="25"/>
  <g font-family="Arial" font-size="10" text-anchor="middle">
    <text y="8">
      <!-- innermost: very light, use dark text -->
      <tspan x="75" dy="-1.2em">System</tspan>
      <tspan x="75" dy="1.2em">Interfaces</tspan>
    </text>
    <!-- PSE51 on #00aeff — dark text -->
    <text x="25">PSE51</text>
    <!-- PSE52 on #0070c5 — white text -->
    <text x="-25" fill="#ffffff">PSE52</text>
    <!-- PSE53 on #7929d2 — white text -->
    <text x="-75" fill="#ffffff">PSE53</text>
  </g>
</svg>
